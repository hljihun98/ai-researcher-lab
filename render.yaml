# AI Researcher Lab 웹앱을 Render web 서비스로 배포한다.
# gunicorn이 $PORT에 바인딩된 상시 프로세스로 뜨고, 브라우저에서 접속 가능.
# 배포 후 URL: https://<서비스이름>.onrender.com
services:
  - type: web
    name: ai-researcher-lab
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # 세션은 여러 API 호출 + 무료등급 429 백오프로 길어질 수 있어 타임아웃을 넉넉히.
    # 세션 기록은 프로세스 메모리에 저장하므로 워커를 하나만 사용해야 조회가 일관된다.
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1
    envVars:
      # 실시간(Gemini)으로 돌리려면 대시보드에서 GEMINI_API_KEY를 설정.
      # 키가 없으면 앱이 자동으로 데모 모드로 폴백한다.
      - key: PYTHON_VERSION
        value: "3.11"
